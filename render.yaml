# Render Blueprint. После пуша в GitHub зайдите в Render → New → Blueprint
# и укажите этот репозиторий — он сам создаст сервис и БД.

services:
  - type: web
    name: minutes-bot
    runtime: python
    plan: starter            # free засыпает через 15 мин простоя — для бота не годится
    region: frankfurt        # ближе к Москве, чем us-*
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: BOT_TOKEN
        sync: false          # задать вручную в Dashboard
      - key: WEBHOOK_BASE
        sync: false          # https://<имя_сервиса>.onrender.com
      - key: WEBHOOK_SECRET
        generateValue: true  # Render сам сгенерит длинный токен
      - key: DATABASE_URL
        fromDatabase:
          name: minutes-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: minutes-db
    plan: free               # бесплатный тариф — на 90 дней, потом надо платный
    region: frankfurt
    databaseName: minutes
    user: minutes
